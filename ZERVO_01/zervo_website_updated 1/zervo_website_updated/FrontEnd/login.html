  <style>
    body {

<body class="bg-surface text-on-surface min-h-screen flex flex-col relative overflow-x-hidden">
  <!-- Background Organic Shapes -->
  <div class="fixed inset-0 organic-gradient -z-10"></div>
  <div class="fixed -top-24 -left-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
  <div class="fixed -bottom-24 -right-24 w-96 h-96 bg-secondary-container/10 rounded-full blur-3xl"></div>
  <!-- Main Content Canvas -->
  <main class="flex-grow flex items-center justify-center p-6 sm:p-12">
    <div
      class="w-full max-w-md bg-surface-container-lowest rounded-xl p-8 sm:p-10 shadow-[0px_20px_40px_rgba(23,29,20,0.06)] relative overflow-hidden">
      <!-- Brand Anchor -->
      <div class="flex flex-col items-center mb-8">
        <a href="index.html" class="font-headline font-black text-3xl text-primary tracking-tight block">ZERVO</a>
      </div>
      <!-- Error Feedback Section -->
      <div class="mb-6 flex items-center gap-3 p-4 bg-error-container rounded-lg hidden" id="error-message">
        <span class="material-symbols-outlined text-error text-xl" data-icon="error_outline">error_outline</span>
        <p class="text-sm font-medium text-on-error-container">Invalid email or password. Please try again.</p>
      </div>
      <!-- Login Form -->
      <form class="space-y-6">
        <!-- Email Field -->
        <div class="space-y-2">
          <label class="block font-headline font-bold text-sm px-1 text-on-surface">Email Address</label>
          <input
            class="w-full px-5 py-4 bg-surface-container-highest rounded-lg border-none focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline/60"
            id="email-input" placeholder="hello@zervo.organic" type="email" />
        </div>
        <!-- Password Field -->
        <div class="space-y-2">
          <div class="flex justify-between items-end px-1">
            <label class="block font-headline font-bold text-sm text-on-surface">Password</label>
            <span class="text-[10px] font-bold text-outline uppercase tracking-wider">Must be at least 8
              characters</span>
          </div>
          <div class="relative group">
            <input
              class="w-full px-5 py-4 bg-surface-container-highest rounded-lg border-none focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline/60"
              id="password-input" placeholder="••••••••" type="password" />
            <button
              class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors"
              id="toggle-password"
              type="button">
              <span class="material-symbols-outlined" id="eye-icon" data-icon="visibility">visibility</span>
            </button>
          </div>
          <div class="flex justify-end px-1">
            <a class="text-xs font-bold text-primary hover:underline transition-all" href="forgot-password.html">Forgot Password?</a>
          </div>
        </div>
        <!-- Remember Me & Actions -->
        <!-- Submit Button -->
        <button
          class="w-full py-4 bg-primary text-on-primary font-headline font-bold text-lg rounded-xl shadow-lg hover:shadow-primary/20 active:scale-[0.98] transition-all relative overflow-hidden group"
          id="login-button" type="submit">
          <span class="relative z-10">Login</span>
          <div
            class="absolute inset-0 bg-gradient-to-tr from-white/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity">
          </div>
        </button>
        <!-- Divider -->
        <!-- Social Login -->
      </form>
      <!-- Sign Up Prompt -->
      <div class="mt-8 text-center">
        <p class="text-sm text-on-surface-variant font-medium">
          Don't have an account?
          <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="signup.html">Sign up</a>
        </p>
      </div>
    </div>
  </main>
  <script type="module">
    // ── Firebase Setup ──────────────────────────────────────────────
    import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword,
             signOut,
             onAuthStateChanged }                     from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // 🔴 PASTE YOUR FIREBASE CONFIG HERE
    const firebaseConfig = {
      apiKey: "AIzaSyB8ynZXXUV7MJLbZNd42CEUpZDRWXoHM30",
      authDomain: "zervo-9585.firebaseapp.com",
      projectId: "zervo-9585",
      storageBucket: "zervo-9585.firebasestorage.app",
      messagingSenderId: "892339796416",
      appId: "1:892339796416:web:f9810482ae1c40be6b3025"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ── DOM Elements (unchanged IDs from your design) ───────────────
    const errorMessage  = document.getElementById('error-message');
    const loginButton   = document.getElementById('login-button');
    const emailInput    = document.getElementById('email-input');
    const passwordInput = document.getElementById('password-input');
    const loginForm     = document.querySelector('form');

    const hideError = () => errorMessage.classList.add('hidden');
    const showError = (msg) => {
      errorMessage.querySelector('p').textContent = msg;
      errorMessage.classList.remove('hidden');
    };

    // ── Login Form Submit → Firebase ────────────────────────────────
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const email    = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      // Show loading state on button
      loginButton.disabled = true;
      loginButton.querySelector('span').textContent = 'Signing in…';

      try {
        await signInWithEmailAndPassword(auth, email, password);
        // ✅ Success → go to role selection
        window.location.href = 'role-selection.html';
      } catch (err) {
        loginButton.disabled = false;
        loginButton.querySelector('span').textContent = 'Login';
        const messages = {
          'auth/invalid-credential':      'Invalid email or password. Please try again.',
          'auth/user-not-found':          'No account found with this email.',
          'auth/wrong-password':          'Incorrect password. Please try again.',
          'auth/too-many-requests':       'Too many attempts. Please wait and try again.',
          'auth/network-request-failed':  'Network error. Check your internet connection.',
        };
        showError(messages[err.code] || 'Something went wrong. Please try again.');
      }
    });

    // ── Hide error when user types ──────────────────────────────────
    emailInput.addEventListener('input', hideError);
    passwordInput.addEventListener('input', hideError);

    // ── Toggle password visibility (your existing logic, unchanged) ─
    const togglePassword = document.getElementById('toggle-password');
    const eyeIcon        = document.getElementById('eye-icon');
    togglePassword.addEventListener('click', () => {
      const isPassword = passwordInput.getAttribute('type') === 'password';
      passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
      eyeIcon.textContent = isPassword ? 'visibility_off' : 'visibility';
    });

    // ── Sign out when login page opens (so user can log in fresh) ──
    signOut(auth).catch(() => {});

    // ── If already logged in, skip login page (only after manual nav) ──
    // Removed auto-redirect so user can always access login page
  </script>
</body>

</html>
