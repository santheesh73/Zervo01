<script>
  function togglePopup(id) {
    const popup = document.getElementById(id);
    const otherId = id === "notification-popup" ? "profile-popup" : "notification-popup";
    const otherPopup = document.getElementById(otherId);
    if (otherPopup) otherPopup.classList.add("popup-hidden");
    if (popup) popup.classList.toggle("popup-hidden");
  }

  // Close legacy popups only if those IDs exist.
  window.addEventListener("click", function(e) {
    if (!e.target.closest(".relative")) {
      const notificationPopup = document.getElementById("notification-popup");
      const profilePopup = document.getElementById("profile-popup");
      if (notificationPopup) notificationPopup.classList.add("popup-hidden");
      if (profilePopup) profilePopup.classList.add("popup-hidden");
    }
  });
</script>
<script type="module" src="assets/js/notifications.js"></script>
<script type="module" src="assets/js/profile.js"></script>

<script type="module">
  import { initializeApp }               from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, push, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { normalizePhone, queueSms } from "./assets/js/sms-notify.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB8ynZXXUV7MJLbZNd42CEUpZDRWXoHM30",
    authDomain: "zervo-9585.firebaseapp.com",
    projectId: "zervo-9585",
    storageBucket: "zervo-9585.firebasestorage.app",
    messagingSenderId: "892339796416",
    appId: "1:892339796416:web:f9810482ae1c40be6b3025",
    databaseURL: "https://zervo-9585-default-rtdb.firebaseio.com"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getDatabase(app);
  let currentUser = null;
  function showToast(msg, isError = false) {
    let t = document.getElementById('req-toast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'req-toast';
      t.style.cssText = 'position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 24px;border-radius:999px;font-weight:700;font-size:14px;box-shadow:0 4px 20px rgba(0,0,0,0.15);display:none;font-family:Manrope,sans-serif;';
      document.body.appendChild(t);
    }
    t.textContent      = msg;
    t.style.background = isError ? '#ba1a1a' : '#0d631b';
    t.style.color      = '#fff';
    t.style.display    = 'block';
    setTimeout(() => t.style.display = 'none', 3500);
  }

  onAuthStateChanged(auth, (user) => {
    if (user) currentUser = user;
    else window.location.href = 'login.html';
  });

  document.getElementById('submit-btn').addEventListener('click', async () => {
    if (!currentUser) return;
    const orgName = document.getElementById('org-name')?.value.trim();
    const address = document.getElementById('address')?.value.trim();
    const contact = document.getElementById('contact')?.value.trim();

    if (!orgName) { showToast('❌ Please enter your organization name', true); return; }
    if (!address) { showToast('❌ Please enter your delivery address', true); return; }
    if (!contact) { showToast('❌ Please enter your contact number', true); return; }

    const btn   = document.getElementById('submit-btn');
    const label = document.getElementById('submit-label');
    btn.disabled      = true;
    label.textContent = 'Sending…';

    try {
      const reqRef = push(ref(db, 'food_requests'));
      await set(reqRef, {
        id: reqRef.key, receiverId: currentUser.uid,
        organisation: orgName, address, contact,
        status: 'pending', createdAt: Date.now()
      });

      // Notify all volunteers (in-app + SMS queue)
      const usersSnap = await get(ref(db, 'users'));
      if (usersSnap.exists()) {
        const tasks = [];
        const msg = orgName + ' needs food delivery at ' + address + '. Contact: ' + contact;
        const smsBody = 'ZERVO: Food request — ' + orgName + ' at ' + address + '. Open app for details.';

        for (const [uid, u] of Object.entries(usersSnap.val())) {
          const role = String(u?.role ?? '').trim().toLowerCase();
          if (role !== 'volunteer') continue;

          const phoneDigits = normalizePhone(u.phone ?? u.mobile);
          const nRef = push(ref(db, 'notifications/' + uid));
          tasks.push(set(nRef, {
            id: nRef.key,
            type: 'food_request',
            title: '🤝 New Food Request!',
            message: msg,
            requestId: reqRef.key,
            isRead: false,
            createdAt: Date.now(),
            toPhone: phoneDigits || null,
          }));
          tasks.push(queueSms(db, {
            toDigits: phoneDigits,
            body: smsBody,
            userUid: uid,
            type: 'food_request',
            extra: { requestId: reqRef.key },
          }));
        }
        await Promise.all(tasks);
      }

      showToast('✅ Request sent! Volunteers notified.');
      document.getElementById('org-name').value = '';
      document.getElementById('address').value  = '';
      document.getElementById('contact').value  = '';
    } catch (err) {
      console.error(err);
      showToast('❌ Error sending request. Try again.', true);
    } finally {
      btn.disabled = false;
      label.textContent = 'Submit Request';
    }
  });
</script>
