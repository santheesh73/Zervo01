<!-- Form Interceptor -->
<script type="module">
    // ── Firebase Setup ──────────────────────────────────────────────
    import { initializeApp }                                from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword,
             updateProfile }                               from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref,
             set }                                        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // 🔴 PASTE YOUR FIREBASE CONFIG HERE
    const firebaseConfig = {
      apiKey: "AIzaSyB8ynZXXUV7MJLbZNd42CEUpZDRWXoHM30",
      authDomain: "zervo-9585.firebaseapp.com",
      projectId: "zervo-9585",
      storageBucket: "zervo-9585.firebasestorage.app",
      messagingSenderId: "892339796416",
      appId: "1:892339796416:web:f9810482ae1c40be6b3025",
      databaseURL: "https://zervo-9585-default-rtdb.firebaseio.com"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getDatabase(app);

    // ── DOM Elements (unchanged IDs from your design) ───────────────
    const form          = document.querySelector('form');
    const nameInput     = document.getElementById('name');
    const phoneInput    = document.getElementById('phone');
    const emailInput    = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn     = form.querySelector('button[type="submit"]');

    // ── Signup Form Submit → Firebase ────────────────────────────────
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const name     = nameInput.value.trim();
      const phone    = phoneInput.value.trim();
      const email    = emailInput.value.trim();
      const password = passwordInput.value;

      if (!name || !email || !password) {
        alert('Please fill in all required fields.');
        return;
      }
      if (password.length < 8) {
        alert('Password must be at least 8 characters.');
        return;
      }

      // Prevent double-submit while request is in progress
      submitBtn.disabled = true;

      try {
        // Create user in Firebase Auth
        const { user } = await createUserWithEmailAndPassword(auth, email, password);

        // Save display name
        await updateProfile(user, { displayName: name });

        // Save user profile in Realtime Database
        await set(ref(db, 'users/' + user.uid), {
          uid:       user.uid,
          name:      name,
          phone:     phone || null,
          email:     email,
          role:      null,
          createdAt: new Date().toISOString(),
        });

        // ✅ Success → go to role selection
        window.location.href = 'role-selection.html';

      } catch (err) {
        submitBtn.disabled = false;
        const messages = {
          'auth/email-already-in-use':  'An account with this email already exists.',
          'auth/invalid-email':         'Please enter a valid email address.',
          'auth/weak-password':         'Password is too weak. Use at least 8 characters.',
          'auth/network-request-failed':'Network error. Check your internet connection.',
        };
        alert(messages[err.code] || 'Something went wrong. Please try again.');
      }
    });

    // ── Toggle password visibility (your existing logic, unchanged) ─
    const togglePassword = document.getElementById('toggle-password');
    const eyeIcon        = document.getElementById('eye-icon');
    if (togglePassword && passwordInput && eyeIcon) {
      togglePassword.addEventListener('click', () => {
        const isPassword = passwordInput.getAttribute('type') === 'password';
        passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
        eyeIcon.textContent = isPassword ? 'visibility_off' : 'visibility';
      });
    }
</script>
