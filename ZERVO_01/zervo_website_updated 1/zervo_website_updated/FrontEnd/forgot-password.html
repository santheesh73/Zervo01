<body class="bg-[#f5fced] font-body text-on-background min-h-screen flex flex-col overflow-x-hidden">
<!-- TopNavBar -->
<header class="fixed top-0 w-full flex justify-between items-center px-8 py-4 bg-[#f5fced]/80 dark:bg-zinc-950/80 backdrop-blur-xl z-50 font-['Plus_Jakarta_Sans'] font-bold tracking-tight bg-surface-container-low hidden">
<div class="text-2xl font-black text-green-900 dark:text-green-400 tracking-tighter">ZERVO</div>
<nav class="hidden md:flex gap-8">
<a class="text-zinc-600 dark:text-zinc-400 hover:text-green-800 transition-all" href="#">Donate</a>
<a class="text-zinc-600 dark:text-zinc-400 hover:text-green-800 transition-all" href="#">Receive</a>
<a class="text-zinc-600 dark:text-zinc-400 hover:text-green-800 transition-all" href="#">About</a>
</nav>
<button class="bg-primary text-on-primary px-6 py-2 rounded-full scale-95 active:scale-90 duration-200">Sign In</button>
</header>
<!-- Main Content: Forgot Password Card -->
<main class="flex-grow flex items-center justify-center px-6 py-20">
<div class="w-full max-w-md">
<!-- Brand Logo & Headline -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center mb-6">
<a href="index.html" class="text-2xl font-black text-primary font-headline tracking-tighter hover:opacity-80 transition-opacity">ZERVO</a>
</div>
<h1 class="text-3xl font-extrabold text-primary font-headline tracking-tight mb-3">Forgot your password?</h1>
<p class="text-on-surface-variant px-4">Enter your email address and we'll send you a link to reset your password.</p>
</div>
<!-- Form Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 md:p-10 shadow-[0px_20px_40px_rgba(23,29,20,0.06)] border border-outline-variant/10">
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface ml-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px] group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
</div>
<input class="w-full bg-surface-container-highest border-none focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-outline transition-all duration-300" id="email" name="email" placeholder="hello@zervo.app" type="email"/>
</div>
</div>
<!-- CTA Button -->
<button class="w-full bg-primary text-on-primary font-bold py-4 px-6 rounded-full flex items-center justify-center gap-2 hover:bg-primary-container transition-all duration-300 group shadow-lg shadow-primary/10" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Navigation Back -->
<div class="mt-10 text-center">
<a class="inline-flex items-center gap-2 text-primary font-semibold hover:text-primary-container transition-colors group" href="login.html">
<span class="material-symbols-outlined text-[20px] group-hover:-translate-x-1 transition-transform" data-icon="arrow_back">arrow_back</span>
<span>Return to Login</span>
</a>
</div>
</div>
</div>
</main>
<script type="module">
    // ── Firebase Setup ──────────────────────────────────────────────
    import { initializeApp }            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth,
             sendPasswordResetEmail }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // 🔴 PASTE YOUR FIREBASE CONFIG HERE
    const firebaseConfig = {
      apiKey: "AIzaSyB8ynZXXUV7MJLbZNd42CEUpZDRWXoHM30",
      authDomain: "zervo-9585.firebaseapp.com",
      projectId: "zervo-9585",
      storageBucket: "zervo-9585.firebasestorage.app",
      messagingSenderId: "892339796416",
      appId: "1:892339796416:web:f9810482ae1c40be6b3025"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ── DOM Elements ────────────────────────────────────────────────
    const form      = document.querySelector('form');
    const emailInput = document.getElementById('email');
    const submitBtn  = form.querySelector('button[type="submit"]');

    // ── Forgot Password Submit → Firebase ───────────────────────────
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();
      if (!email) {
        alert('Please enter your email address.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.querySelector('span:first-child').textContent = 'Sending…';

      try {
        await sendPasswordResetEmail(auth, email);
        // ✅ Show success message
        submitBtn.querySelector('span:first-child').textContent = 'Email Sent!';
        alert('✅ Password reset link sent! Please check your inbox.');
        window.location.href = 'login.html';
      } catch (err) {
        submitBtn.disabled = false;
        submitBtn.querySelector('span:first-child').textContent = 'Send Reset Link';
        const messages = {
          'auth/user-not-found':         'No account found with this email.',
          'auth/invalid-email':          'Please enter a valid email address.',
          'auth/network-request-failed': 'Network error. Check your internet connection.',
        };
        alert(messages[err.code] || 'Something went wrong. Please try again.');
      }
    });
</script>
</body></html>
